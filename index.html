<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Fira ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd1dc,#ff9eb5,#ffc2d1,#ffe3ea);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:90%;
    max-width:380px;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(12px);
    border-radius:30px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(255,77,109,0.25);
    animation:fadeIn 1s ease;
    border:1px solid rgba(255,255,255,0.4);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-family:'Caveat',cursive;
    font-size:48px;
    color:#ff4d6d;
    margin-bottom:15px;
}

p{
    color:#555;
    font-size:16px;
    line-height:1.8;
    min-height:140px;
}

button{
    border:none;
    border-radius:15px;
    padding:13px 28px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-main{
    background:#ff4d6d;
    color:white;
    box-shadow:0 6px 18px rgba(255,77,109,0.35);
}

.btn-main:hover{
    transform:scale(1.07);
}

.btn-no{
    background:#888;
    color:white;
    position:absolute;
    display:none;
}

.btn-group{
    margin-top:25px;
    position:relative;
    height:60px;
}

.heart{
    position:absolute;
    color:#ff4d6d;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- Musik -->
<audio id="bgMusic" loop>
    <source src="https://files.catbox.moe/8f2h7g.mp3" type="audio/mp3">
</audio>

<div class="container">

    <h1 id="title">Hai Fira ❤️</h1>

    <p id="message"></p>

    <div class="btn-group" id="btnGroup">

        <button class="btn-main" id="yesBtn" onclick="playStep()">
            Sentuh Aku ✨
        </button>

        <button class="btn-no" id="noBtn"
        onmouseover="moveBtn()"
        ontouchstart="moveBtn()">
            Enggak 😜
        </button>

    </div>
</div>

<script>

let step = 1;

const messages = [
`Aku gak tahu gimana cara paling tepat buat nyampein ini...
tapi kamu bikin hari-hariku jadi lebih hangat 🤍`,

`Sejak kamu hadir, hal-hal sederhana jadi terasa spesial.
Bahkan chat kamu aja bisa bikin aku senyum sendiri.`,

`Aku gak tahu kapan mulai, tapi aku nyaman sama kamu...
dan itu tumbuh tanpa aku sadari.`,

`Kalau aku jujur... aku pengen kamu jadi bagian spesial di hidup aku.
Kamu mau gak?`,

`Makasih ya... sudah mau jadi bagian dari cerita ini 🥺✨
Kita mulai sesuatu yang baru ya, pelan-pelan.`
];

const titles = [
"Hai Fira ❤️",
"Kamu 🌸",
"Perasaan Ini 🤍",
"Pertanyaan 💖",
"Terima Kasih ❤️"
];

const btnText = [
"Sentuh Aku ✨",
"Lanjut ❤️",
"Terus...? ✨",
"Iya ❤️",
""
];

function typeText(text){
    const msg = document.getElementById("message");
    msg.innerHTML = "";
    let i = 0;

    let typing = setInterval(()=>{
        msg.innerHTML += text.charAt(i);
        i++;
        if(i >= text.length){
            clearInterval(typing);
        }
    }, 30);
}

function playStep(){

    document.getElementById("bgMusic").play();

    const title = document.getElementById("title");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");

    title.innerHTML = titles[step-1];
    typeText(messages[step-1]);

    yesBtn.innerHTML = btnText[step];

    if(step === 3){
        noBtn.style.display = "block";
    }

    if(step === 4){
        document.getElementById("btnGroup").style.display = "none";
        setInterval(createHeart,120);
    }

    step++;
}

function moveBtn(){
    const noBtn = document.getElementById("noBtn");

    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 18 + 14) + "px";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(),5000);
}

</script>

</body>
</html>
