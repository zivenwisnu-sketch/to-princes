<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>buat kamu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#ff9ecf,#ffd6ec);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:fade 1s ease;
}

h1{
    margin-bottom:15px;
    color:#ff4f9a;
}

p{
    margin-bottom:25px;
    color:#555;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:15px;
    cursor:pointer;
    margin:10px;
    font-size:16px;
    transition:0.3s;
}

#yes{
    background:#ff4f9a;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:#eee;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="card">
    <h1 id="title">eh bentar 😭</h1>
    <p id="text">aku cuma mau nanya sesuatu...</p>

    <button id="yes">apa tuh?</button>
    <button id="no">gak mau</button>
</div>

<script>
const title = document.getElementById("title");
const text = document.getElementById("text");
const yes = document.getElementById("yes");
const no = document.getElementById("no");

let step = 0;

yes.addEventListener("click", () => {

    step++;

    if(step == 1){
        title.innerHTML = "sebenernya...";
        text.innerHTML = "aku nyaman ngobrol sama kamu 😔";
        yes.innerHTML = "terus?";
    }

    else if(step == 2){
        title.innerHTML = "dan...";
        text.innerHTML = "kamu lucu juga sih";
        yes.innerHTML = "cie lanjut";
    }

    else if(step == 3){
        title.innerHTML = "jadi gini";
        text.innerHTML = "mau gak jadi orang spesial aku? 🥹";
        yes.innerHTML = "MAUU";
        no.style.display = "inline-block";
    }

    else{
        document.body.innerHTML = `
        <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        flex-direction:column;
        background:#ffd6ec;
        font-family:Arial;
        text-align:center;
        ">
            <h1 style="font-size:50px;color:#ff4f9a;">YEAYYY 💖</h1>
            <p style="font-size:22px;">
                sekarang kamu resmi jadi alasan aku senyum terus 😭
            </p>
        </div>
        `;
    }
});

no.addEventListener("mouseover", () => {
    if(step >= 2){
        no.style.position = "absolute";
        no.style.top = Math.random() * 80 + "%";
        no.style.left = Math.random() * 80 + "%";
    }
});
</script>

</body>
</html>
