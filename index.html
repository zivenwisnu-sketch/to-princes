<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Fira ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd1dc,#ff9eb5,#ffc2d1);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    position:relative;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:90%;
    max-width:380px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 10px 35px rgba(255,77,109,0.25);
    z-index:10;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-family:'Caveat',cursive;
    font-size:46px;
    color:#ff4d6d;
    margin-bottom:15px;
}

p{
    color:#555;
    font-size:16px;
    line-height:1.8;
    min-height:130px;
}

button{
    border:none;
    border-radius:15px;
    padding:13px 28px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-main{
    background:#ff4d6d;
    color:white;
    box-shadow:0 5px 15px rgba(255,77,109,0.35);
}

.btn-main:hover{
    transform:scale(1.05);
}

.btn-no{
    background:#999;
    color:white;
    position:absolute;
    display:none;
}

.btn-group{
    margin-top:25px;
    position:relative;
    height:60px;
}

.heart{
    position:absolute;
    color:#ff4d6d;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<!-- Musik romantis -->
<audio autoplay loop>
    <source src="https://files.catbox.moe/8f2h7g.mp3" type="audio/mp3">
</audio>

<div class="container">

    <h1 id="title">Hai Fira ❤️</h1>

    <p id="message">
        Aku cuma mau bilang...
        kadang seseorang datang bukan buat sekadar lewat,
        tapi buat tinggal di hati 🤍
    </p>

    <div class="btn-group" id="btnGroup">

        <button class="btn-main" id="yesBtn" onclick="nextStep()">
            Klik di sini ✨
        </button>

        <button class="btn-no" id="noBtn"
        onmouseover="moveBtn()"
        ontouchstart="moveBtn()">
            Enggak 😜
        </button>

    </div>
</div>

<script>

let step = 1;

function nextStep(){

    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");

    if(step === 1){

        title.innerHTML = "Tentang Kamu 🌸";

        message.innerHTML =
        "Entah sejak kapan, aku jadi nyaman banget sama kamu. Chat sederhana dari kamu aja bisa bikin mood aku membaik seharian.";

        yesBtn.innerHTML = "Lanjut ❤️";

        step++;

    }

    else if(step === 2){

        title.innerHTML = "Aku Suka Kamu 🤍";

        message.innerHTML =
        "Aku suka cara kamu ngobrol, cara kamu ketawa, dan cara kamu hadir tanpa sadar bikin hidup aku lebih indah.";

        yesBtn.innerHTML = "Terus...? ✨";

        step++;

    }

    else if(step === 3){

        title.innerHTML = "Mau Gak? 💖";

        message.innerHTML =
        "Jadi... kamu mau gak jadi seseorang yang spesial buat aku? Bukan cuma hari ini, tapi semoga untuk waktu yang lama ✨";

        yesBtn.innerHTML = "Mau ❤️";

        noBtn.style.display = "block";

        step++;

    }

    else if(step === 4){

        title.innerHTML = "YEAAYYY ❤️";

        message.innerHTML =
        "Sekarang kamu resmi jadi orang favorit aku 🥺❤️ Makasih udah nerima perasaan ini. Semoga kita bisa bikin banyak cerita manis bareng ya ✨";

        document.getElementById("btnGroup").style.display = "none";

        setInterval(createHeart,150);
    }
}

function moveBtn(){

    const noBtn = document.getElementById("noBtn");

    const x = Math.random() * (window.innerWidth - 100);

    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";

    noBtn.style.top = y + "px";
}

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";

    heart.style.fontSize = (Math.random() * 20 + 15) + "px";

    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}
</script>

</body>
</html>
